<svg width="200" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f3f0ec; }
      .head { fill: #d4d1ca; }
      .face { fill: #fbfbf9; }
      .text { fill: #7a7974; font-family: 'Artifakt Element', sans-serif; font-size: 14px; }
    </style>
  </defs>
  <rect width="200" height="250" class="bg"/>
  <circle cx="100" cy="80" r="35" class="head"/>
  <rect x="60" y="120" width="80" height="90" rx="8" class="face"/>
  <text x="100" y="200" text-anchor="middle" class="text">Your Photo</text>
  <text x="100" y="220" text-anchor="middle" class="text" font-size="12">200x250px</text>
</svg>
